<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>Tarik Tiket SERVANT</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        width: 520px;
        padding: 14px;
        background: #f7f7f7;
      }

      h3 {
        margin-top: 0;
      }

      button {
        padding: 8px 12px;
        margin-right: 6px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        background: #2563eb;
        color: white;
        font-weight: bold;
      }

      button.secondary {
        background: #4b5563;
      }

      textarea {
        width: 100%;
        height: 420px;
        margin-top: 12px;
        font-family: Consolas, monospace;
        font-size: 13px;
        padding: 8px;
        box-sizing: border-box;
        white-space: pre;
      }

      .status {
        font-size: 12px;
        margin-top: 8px;
        color: #374151;
      }

      .warning {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <h3>Tarik Tiket SERVANT</h3>
    <br />
    <h2>KALAU KENA 401 HARAP REFRESH HALAMAN</h2>

    <button id="btnFetch">Tarik Tiket</button>
    <button id="btnCopy" class="secondary">Copy</button>
    <button id="btnDownload" class="secondary">Download TXT</button>

    <div id="status" class="status">Status: belum tarik data.</div>

    <textarea
      id="output"
      placeholder="Hasil handover akan muncul di sini..."
    ></textarea>

    <script src="popup.js"></script>
  </body>
</html>
